<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obras</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>

<header class="topbar">
  <h1>Controle de Obras</h1>
  <nav class="topbar-actions">
    <a href="../obras/index.html" class="btn btn-ghost">Obras</a>
    <a href="../fornecedores/index.html" class="btn btn-ghost">Fornecedores</a>
    <button id="btn-config" class="btn btn-ghost" title="Configurar conexão">⚙ Configuração</button>
  </nav>
</header>

<section id="config-panel" class="config-panel hidden">
  <div class="field">
    <label for="cfg-url">URL do App da Web (Apps Script)</label>
    <input id="cfg-url" type="text" placeholder="https://script.google.com/macros/s/xxx/exec">
  </div>
  <div class="field">
    <label for="cfg-token">Token (senha do script, opcional)</label>
    <input id="cfg-token" type="text" placeholder="mesma senha da propriedade TOKEN">
  </div>
  <button id="btn-salvar-config" class="btn btn-primary">Salvar</button>
  <span id="config-status" class="status-msg"></span>
</section>

<main class="view">
  <div class="view-header">
    <h2>Obras</h2>
    <button id="btn-nova-obra" class="btn btn-primary">+ Nova Obra</button>
  </div>
  <div id="obras-lista" class="cards-grid"></div>
</main>

<div id="modal-nova-obra" class="modal hidden">
  <div class="modal-box">
    <h3>Nova Obra</h3>
    <form id="form-obra">
      <div class="field">
        <label>Nome da obra</label>
        <input name="nome" required>
      </div>
      <div class="field">
        <label>Cliente</label>
        <input name="cliente">
      </div>
      <div class="field">
        <label>CNO</label>
        <input name="cno" placeholder="Cadastro Nacional de Obras">
      </div>
      <div class="field">
        <label>Observações</label>
        <textarea name="observacoes" rows="3"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" id="btn-cancelar-obra" class="btn btn-ghost">Cancelar</button>
        <button type="submit" class="btn btn-primary">Criar</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="../shared/shared.js"></script>
<script src="app.js"></script>
</body>
</html>
